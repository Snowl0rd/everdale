<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Пантеон — Эвердейл</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="site-nav">
  <a href="index.html" class="nav-brand">Эвердейл</a>
  <ul class="nav-links" id="navLinks">
    <li><a href="world.html">Мир</a></li>
    <li><a href="npcs.html">НПС</a></li>
    <li><a href="pantheon.html" class="active">Пантеон</a></li>
  </ul>
  <button class="nav-toggle" id="navToggle">☰</button>
</nav>

<div class="page-wrap">
  <div class="container">
    <div class="page-hero">
      <span class="page-hero__tag">Боги Эвердейла</span>
      <h1 class="page-hero__title">Пантеон</h1>
      <p class="page-hero__sub">Те, кому молятся — и те, кого боятся</p>
    </div>

    <div class="filters" id="godsFilters">
      <button class="filter-btn active" data-align="all">Все</button>
      <button class="filter-btn" data-align="благой">Благие</button>
      <button class="filter-btn" data-align="нейтральный">Нейтральные</button>
      <button class="filter-btn" data-align="злой">Тёмные</button>
    </div>

    <div class="gods-grid" id="godsGrid"></div>
  </div>
</div>

<!-- Модал бога -->
<div class="modal-overlay" id="godModal">
  <div class="modal" style="max-width:700px;">
    <button class="modal__close" id="godModalClose">✕</button>
    <div id="godModalImg"></div>
    <div class="modal__content">
      <div class="modal__name" id="godModalName"></div>
      <div class="modal__race" id="godModalDomain"></div>
      <div class="modal__role" id="godModalAlignment"></div>
      <div style="font-size:0.8rem;color:var(--gold-dim);margin-bottom:0.3rem;" id="godModalSymbol"></div>
      <div style="font-size:0.8rem;color:var(--text-dim);margin-bottom:1rem;padding-bottom:1rem;border-bottom:1px solid var(--border);" id="godModalTitles"></div>
      <div class="modal__desc" id="godModalDesc"></div>
      <div style="font-size:0.8rem;color:var(--text-dim);margin-top:1rem;padding-top:1rem;border-top:1px solid var(--border);font-style:italic;" id="godModalWorship"></div>
    </div>
  </div>
</div>

<footer class="site-footer">
  Эвердейл · Homebrew Campaign
</footer>

<script src="js/nav.js"></script>
<script src="js/pantheon.js"></script>
</body>
</html>
